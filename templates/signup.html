{% extends 'layout.html' %}

{% block content %}
    <h2>Sign up</h2>
    <form method='POST' action="{{ url_for('signup') }}">
        Username: <input type="text" name="username" value="{{ username or '' }}"/>
        Password: <input type="password" name="password" value=""/>
        <div>
            <input type="submit" value="Submit"/>
        </div>
    </form>

{% endblock %}
